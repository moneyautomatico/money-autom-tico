<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Partner 2026 | Full Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #00ff88; --b: #0b0f1a; --c: #161b2c; }
        body { background: var(--b); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .card { background: var(--c); border-radius: 12px; padding: 20px; margin: 15px; border: 1px solid #2d334a; }
        textarea, input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #0b0f1a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--p); font-weight: bold; cursor: pointer; color: black; }
        .tab { display: none; } .tab.active { display: block; }
        nav { position: fixed; bottom: 0; width: 100%; background: var(--c); display: flex; border-top: 1px solid #2d334a; }
        .nav-btn { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 12px; }
        #waModal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; z-index: 1000; }
        #qrcode { background: white; padding: 15px; border-radius: 10px; margin: 20px auto; width: fit-content; }
        .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m-ia { align-self: flex-end; background: var(--p); color: black; padding: 10px; border-radius: 10px; font-size: 12px; }
        .m-us { align-self: flex-start; background: #2d334a; padding: 10px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="loginV" style="height: 80vh; display: flex; align-items: center; justify-content: center;">
        <div class="card" style="width: 300px; text-align: center;">
            <h2 style="color:var(--p)">Money Partner</h2>
            <input id="lEmail" placeholder="E-mail">
            <input id="lPass" type="password" placeholder="Senha">
            <button onclick="auth()">Acessar Painel</button>
        </div>
    </div>

    <div id="dashV" style="display: none;">
        <div id="configTab" class="tab active">
            <div class="card">
                <h3>🧠 Inteligência do Agente</h3>
                <label>Personalidade:</label>
                <textarea id="iaT" rows="2"></textarea>
                <label>Lista de Aprendizagem:</label>
                <textarea id="baseT" rows="4"></textarea>
                <div style="display: flex; gap: 10px;">
                    <div style="flex:1"><label>Delay (s):</label><input type="number" id="delayI" value="3"></div>
                    <div style="flex:1"><label>Status:</label><button id="btnOnOff" onclick="toggleBot()">LIGADO</button></div>
                </div>
                <button onclick="save()" style="margin-top:15px; background: #25d366;">Salvar Configurações</button>
            </div>
        </div>

        <div id="massaTab" class="tab">
            <div class="card">
                <h3>🚀 Disparo em Massa</h3>
                <textarea id="numM" rows="5" placeholder="Números (um por linha)"></textarea>
                <textarea id="msgM" rows="3" placeholder="Mensagem..."></textarea>
                <label>Intervalo (segundos):</label>
                <input type="number" id="intM" value="30">
                <button onclick="disparar()" style="background: white; color: black;">Iniciar Campanha</button>
            </div>
        </div>

        <div id="waModal">
            <div style="padding:15px; background:var(--c); display:flex; justify-content:space-between;">
                <span>Monitor WhatsApp</span><button onclick="modal()" style="width:auto; padding:5px 10px; background:red; color:white;">X</button>
            </div>
            <div id="qrcode"></div>
            <div id="chatBox" class="chat"></div>
        </div>

        <nav>
            <div class="nav-btn" onclick="nav('configTab')">⚙️ Config</div>
            <div class="nav-btn" onclick="nav('massaTab')">🚀 Disparo</div>
            <div class="nav-btn" onclick="modal()">📱 Monitor</div>
        </nav>
    </div>

    <script>
        let botAtivo = true;
        const qrG = new QRCode(document.getElementById("qrcode"), { width: 180, height: 180 });

        function nav(id) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function modal() { const m = document.getElementById("waModal"); m.style.display = m.style.display === "flex" ? "none" : "flex"; }
        function toggleBot() { botAtivo = !botAtivo; btnOnOff.innerText = botAtivo ? "LIGADO" : "DESLIGADO"; btnOnOff.style.background = botAtivo ? "var(--p)" : "red"; }

        async function auth() {
            const res = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:lEmail.value, password:lPass.value}) });
            const d = await res.json();
            if(d.token) { localStorage.setItem("tk", d.token); localStorage.setItem("u", JSON.stringify(d.user)); location.reload(); }
        }

        if(localStorage.getItem("tk")) {
            const u = JSON.parse(localStorage.getItem("u"));
            loginV.style.display = "none"; dashV.style.display = "block";
            iaT.value = u.iaResumo; baseT.value = u.baseAprendizado;
            setInterval(async () => {
                const res = await fetch("/sync", { headers: {"Authorization": localStorage.getItem("tk")} });
                const d = await res.json();
                if(d.status === "READY") document.getElementById("qrcode").style.display = "none";
                else if(d.status.length > 50) { document.getElementById("qrcode").style.display = "block"; qrG.makeCode(d.status); }
                chatBox.innerHTML = d.chats.map(c => `<div class="${c.de==='IA'?'m-ia':'m-us'}"><b>${c.de}:</b> ${c.txt}</div>`).join('');
            }, 4000);
        }

        async function save() {
            await fetch("/save-config", { 
                method:'POST', headers:{'Content-Type':'application/json', 'Authorization':localStorage.getItem("tk")}, 
                body: JSON.stringify({ iaResumo: iaT.value, baseAprendizado: baseT.value, botAtivo, delayResponda: delayI.value * 1000 }) 
            });
            alert("Salvo!");
        }

        async function disparar() {
            const res = await fetch("/disparar", {
                method:'POST', headers:{'Content-Type':'application/json', 'Authorization':localStorage.getItem("tk")}, 
                body: JSON.stringify({ numeros: numM.value, mensagem: msgM.value, intervalo: intM.value })
            });
            const d = await res.json(); alert(d.msg || d.error);
        }
    </script>
</body>
</html>
