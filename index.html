<div class="card" style="border: 1px solid var(--p);">
    <h3>🚀 Disparo em Massa (Anti-Ban)</h3>
    
    <label><b>Lista de Números:</b> (Um por linha com DDD)</label>
    <textarea id="listaNumeros" rows="5" placeholder="5575999999999&#10;5511988888888"></textarea>
    
    <label><b>Mensagem de Envio:</b></label>
    <textarea id="msgMassa" rows="3" placeholder="Olá! Tenho uma oferta para você..."></textarea>
    
    <div style="display: flex; gap: 10px; margin-top:10px;">
        <div style="flex:1">
            <label>Intervalo (segundos):</label>
            <input type="number" id="intervaloMassa" value="30" min="10">
            <small style="color:#888">Recomendado: 30s a 60s</small>
        </div>
    </div>
    
    <button onclick="enviarEmMassa()" style="background: white; color: black; margin-top:15px;">
        Iniciar Campanha de Disparo
    </button>
</div>

<script>
    async function enviarEmMassa() {
        const btn = event.target;
        if(!confirm("Deseja iniciar o disparo? Mantenha esta aba aberta.")) return;
        
        btn.disabled = true;
        btn.innerText = "🚀 Enviando... (Não feche)";

        const res = await fetch("/disparar", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': localStorage.getItem("tk")
            },
            body: JSON.stringify({
                numeros: document.getElementById("listaNumeros").value,
                mensagem: document.getElementById("msgMassa").value,
                intervalo: document.getElementById("intervaloMassa").value
            })
        });

        const data = await res.json();
        alert(data.msg || "Disparo concluído!");
        btn.disabled = false;
        btn.innerText = "Iniciar Campanha de Disparo";
    }
</script>
