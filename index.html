<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Partner | Conexão Real</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card: #161b2c; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin: 15px; border: 1px solid #2d334a; }
        
        /* Botão Flutuante */
        #waBtn { position: fixed; right: 20px; bottom: 20px; background: #25d366; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 20px rgba(37, 211, 102, 0.5); z-index: 999; }
        
        /* Modal de Conexão e Conversa */
        #waModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; z-index: 1000; }
        .modal-header { padding: 20px; border-bottom: 1px solid #2d334a; display: flex; justify-content: space-between; align-items: center; background: var(--card); }
        
        #qrcode { background: white; padding: 15px; border-radius: 10px; margin: 20px auto; display: none; width: fit-content; }
        
        /* Janela de Conversa (Monitor) */
        #chatMonitor { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 12px; font-size: 13px; max-width: 80%; }
        .msg-in { background: #2d334a; align-self: flex-start; }
        .msg-out { background: var(--primary); color: #000; align-self: flex-end; }
    </style>
</head>
<body>

    <div id="mainContent">
        <div class="card">
            <h2 id="userHello">Carregando...</h2>
            <p style="color: #64748b;">Sistema monitorando mensagens em tempo real.</p>
        </div>
        
        <div class="card">
            <h3>🧠 Treinar IA</h3>
            <textarea id="iaTreino" style="width:100%; height:60px; background:#0b0f1a; color:white; border:1px solid #2d334a; border-radius:8px; padding:10px;" placeholder="Ex: Responda que o curso custa R$ 97..."></textarea>
            <button onclick="salvarTreino()" style="width:100%; margin-top:10px; padding:10px; background:var(--primary); border:none; border-radius:8px; font-weight:bold;">Salvar Instrução</button>
        </div>
    </div>

    <div id="waBtn" onclick="toggleModal()">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="35">
    </div>

    <div id="waModal">
        <div class="modal-header">
            <h3 id="waStatus" style="margin:0; font-size:16px;">Verificando...</h3>
            <button onclick="toggleModal()" style="background:#334155; color:white; border:none; padding:8px 15px; border-radius:5px;">Fechar</button>
        </div>
        
        <div id="qrcode"></div>

        <div id="chatMonitor">
            <div class="bubble msg-in">Aguardando primeira mensagem...</div>
        </div>
    </div>

    <script>
        const qrContainer = new QRCode(document.getElementById("qrcode"), { width: 200, height: 200 });

        function toggleModal() {
            const m = document.getElementById("waModal");
            m.style.display = (m.style.display === "flex") ? "none" : "flex";
        }

        // Recupera nome do usuário para evitar "undefined"
        document.getElementById("userHello").innerText = "Olá, " + (localStorage.getItem("userName") || "Parceiro") + "!";

        // Loop de Monitoramento (Status e Conversas)
        setInterval(async () => {
            const token = localStorage.getItem("token");
            if(!token) return;

            try {
                const res = await fetch("/status-wa", { headers: {"Authorization": token} });
                const data = await res.json();
                
                const statusTxt = document.getElementById("waStatus");
                const qrDiv = document.getElementById("qrcode");
                const chatDiv = document.getElementById("chatMonitor");

                if(data.status === "CONECTADO") {
                    statusTxt.innerText = "✅ Robô Conectado";
                    statusTxt.style.color = "#00ff88";
                    qrDiv.style.display = "none";
                    
                    // Se houver conversas no banco (pode adicionar uma rota para isso depois), atualiza aqui
                } else if(data.status.length > 50) {
                    statusTxt.innerText = "⚠️ Escaneie o QR Code:";
                    qrDiv.style.display = "block";
                    qrContainer.clear();
                    qrContainer.makeCode(data.status);
                }
            } catch(e) {}
        }, 5000);

        async function salvarTreino() {
            const texto = document.getElementById("iaTreino").value;
            // Aqui você enviaria para uma rota no server.js para salvar no banco
            alert("IA Treinada com sucesso!");
        }
    </script>
</body>
</html>
