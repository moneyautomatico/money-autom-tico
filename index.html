<!DOCTYPE html>
<html>
<head>
    <title>Painel Money Partner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #0b141a; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1d272e; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        textarea, input { width: 100%; background: #2a3942; color: white; border: 1px solid #444; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 15px; background: #00ff88; border: none; font-weight: bold; cursor: pointer; }
        #qrcode { background: white; padding: 10px; width: fit-content; margin: 10px auto; display: none; }
    </style>
</head>
<body>

    <div id="loginArea">
        <div class="card">
            <h2>Acesso</h2>
            <input id="email" placeholder="E-mail">
            <input id="pass" type="password" placeholder="Senha">
            <button onclick="entrar()">ENTRAR NO PAINEL</button>
        </div>
    </div>

    <div id="mainArea" style="display:none">
        <div class="card">
            <h3>📱 Conexão Monitor</h3>
            <div id="statusZap">Verificando...</div>
            <div id="qrcode"></div>
        </div>

        <div class="card">
            <h3>🚀 Disparo em Massa</h3>
            <textarea id="lista" rows="5" placeholder="5511999999999 (um por linha)"></textarea>
            <textarea id="msg" rows="3" placeholder="Mensagem de envio"></textarea>
            <button onclick="enviarMassa()">LANÇAR CAMPANHA</button>
            <div id="progresso"></div>
        </div>
    </div>

    <script>
        const qr = new QRCode(document.getElementById("qrcode"), { width: 200, height: 200 });

        async function entrar() {
            const r = await fetch("/login", { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({email: email.value, password: pass.value}) 
            });
            if(r.ok) {
                const d = await r.json();
                localStorage.setItem("tk", d.token);
                location.reload();
            }
        }

        if(localStorage.getItem("tk")) {
            loginArea.style.display = 'none';
            mainArea.style.display = 'block';

            setInterval(async () => {
                const r = await fetch("/sync", { headers: {"Authorization": localStorage.getItem("tk")} });
                const d = await r.json();
                if(d.status === "READY") {
                    statusZap.innerText = "✅ CONECTADO";
                    qrcode.style.display = 'none';
                } else if(d.status.length > 50) {
                    statusZap.innerText = "⏳ LEIA O QR CODE";
                    qrcode.style.display = 'block';
                    qr.makeCode(d.status);
                }
            }, 5000);
        }

        async function enviarMassa() {
            const r = await fetch("/disparar", {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': localStorage.getItem("tk")},
                body: JSON.stringify({ numeros: lista.value, mensagem: msg.value, intervalo: 30 })
            });
            const d = await r.json();
            alert(d.msg || d.error);
        }
    </script>
</body>
</html>
