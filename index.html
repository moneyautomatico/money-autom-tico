<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Partner 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card: #161b2c; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin: 15px; border: 1px solid #2d334a; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #2d334a; background: #0b0f1a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--primary); color: black; font-weight: bold; cursor: pointer; }
        
        .tab-link { flex: 1; text-align: center; padding: 15px; font-size: 12px; background: none; border: none; color: #64748b; }
        .tab-link.active { color: var(--primary); border-top: 2px solid var(--primary); }
        .tab-content { display: none; padding-bottom: 90px; }
        .tab-content.active { display: block; }

        #waWidget { position: fixed; right: 20px; bottom: 80px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
        #waModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; z-index: 1000; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 13px; }
    </style>
</head>
<body>

    <div id="loginView" style="display: flex; height: 100vh; align-items: center; justify-content: center;">
        <div class="card" style="width: 320px;">
            <h2 style="text-align: center; color: var(--primary);">Money Partner</h2>
            <div id="regFields" style="display: none;">
                <input id="regNome" placeholder="Nome">
                <input id="regTel" placeholder="WhatsApp">
            </div>
            <input id="lEmail" placeholder="E-mail">
            <input id="lPass" type="password" placeholder="Senha">
            <button onclick="auth()">Entrar</button>
            <p onclick="document.getElementById('regFields').style.display='block'" style="text-align:center; font-size:12px; margin-top:10px; cursor:pointer;">Criar conta</p>
        </div>
    </div>

    <div id="dashView" style="display: none;">
        <div id="home" class="tab-content active">
            <div class="card">
                <h2 id="txtUser">Olá!</h2>
                <p id="txtPlano" style="color: #64748b;"></p>
            </div>
            <div class="card">
                <h3>🧠 Treinar IA</h3>
                <textarea id="txtTreino" placeholder="Instruções para o robô..."></textarea>
                <button onclick="salvarTreino()">Atualizar Robô</button>
            </div>
        </div>

        <div id="admin" class="tab-content">
            <div class="card"><h3>👑 Gestão Master</h3><div id="admUsers"></div></div>
        </div>

        <div id="waModal">
            <div style="padding: 20px; background: var(--card); display: flex; justify-content: space-between;">
                <span>WhatsApp Monitor</span>
                <button onclick="toggleWA()" style="width:auto; padding:5px 10px;">Fechar</button>
            </div>
            <div id="qrcode" style="background:white; margin:20px auto; padding:10px; border-radius:10px; display:none;"></div>
            <div id="chatBox" class="chat-box"></div>
        </div>

        <div id="waWidget" onclick="toggleWA()"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30"></div>

        <nav style="position:fixed; bottom:0; width:100%; display:flex; background:var(--card); border-top:1px solid #2d334a;">
            <button class="tab-link active" onclick="nav('home')">Início</button>
            <button id="btnAdm" class="tab-link" onclick="nav('admin')" style="display:none;">Admin</button>
            <button class="tab-link" onclick="logout()">Sair</button>
        </nav>
    </div>

    <script>
        const qr = new QRCode(document.getElementById("qrcode"), { width: 180, height: 180 });
        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function toggleWA() { 
            const m = document.getElementById("waModal");
            m.style.display = m.style.display === "flex" ? "none" : "flex";
        }

        async function auth() {
            const isReg = document.getElementById('regFields').style.display === 'block';
            const body = { email: lEmail.value, password: lPass.value, usuario: regNome.value, telefone: regTel.value };
            const res = await fetch(isReg ? '/register' : '/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            const data = await res.json();
            if(data.token) {
                localStorage.setItem("token", data.token);
                localStorage.setItem("u", JSON.stringify(data.user));
                location.reload();
            }
        }

        if(localStorage.getItem("token")) {
            const u = JSON.parse(localStorage.getItem("u"));
            loginView.style.display = "none"; dashView.style.display = "block";
            txtUser.innerText = "Olá, " + u.usuario;
            if(u.role === 'admin') btnAdm.style.display = "block";

            setInterval(async () => {
                const res = await fetch("/status-wa", { headers: {"Authorization": localStorage.getItem("token")} });
                const d = await res.json();
                if(d.status === "CONECTADO") { qrcode.style.display="none"; }
                else if(d.status.length > 50) { qrcode.style.display="block"; qr.makeCode(d.status); }
                chatBox.innerHTML = d.conversas.map(c => `<div class="bubble" style="background:${c.de==='IA'?'#00ff88':'#2d334a'}; align-self:${c.de==='IA'?'flex-end':'flex-start'}; color:${c.de==='IA'?'black':'white'}"><b>${c.de}:</b><br>${c.texto}</div>`).join('');
            }, 4000);
        }

        async function salvarTreino() {
            await fetch("/user/treinar", { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': localStorage.getItem("token")}, body: JSON.stringify({instrucao: txtTreino.value}) });
            alert("Treino salvo!");
        }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
