<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Automático | Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #22c55e; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 900px; padding: 20px; }
        .card { background: var(--card); border-radius: 16px; padding: 24px; border: 1px solid #334155; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; }
    </style>
</head>
<body>
    <div class="app-container">
        
        <div id="authScreen" class="card" style="max-width: 400px; margin: 100px auto;">
            <h2 style="text-align: center; color: var(--primary)">🚀 Money Automático</h2>
            <input id="email" type="email" placeholder="Seu E-mail">
            <input id="pass" type="password" placeholder="Sua Senha">
            <button onclick="auth('login')">Entrar no Painel</button>
            <button onclick="auth('register')" style="background: #3b82f6; margin-top: 10px;">Criar Novo Usuário</button>
        </div>

        <div id="dashScreen" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>💰 Meu Robô</h2>
                <button onclick="logout()" style="width: auto; background: #ef4444;">Sair</button>
            </div>

            <div class="grid">
                <div class="card">
                    <h3>📱 Conexão WhatsApp</h3>
                    <div id="statusBadge">Verificando...</div>
                    <div id="qrcode" style="background: white; padding: 10px; margin: 15px auto; width: 150px; display: none;"></div>
                </div>
                <div class="card">
                    <h3>🤖 Minha IA</h3>
                    <textarea id="iaText" rows="3"></textarea>
                    <button onclick="saveIA()">Salvar Configuração</button>
                </div>
            </div>

            <div id="adminPanel" class="card" style="display: none; border: 2px solid #fbbf24;">
                <h2 style="color: #fbbf24;">👑 Painel Master (Administrador)</h2>
                <table>
                    <thead>
                        <tr>
                            <th>E-mail</th>
                            <th>Status</th>
                            <th>Envios</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="userTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const getToken = () => localStorage.getItem("token");

        async function auth(tipo) {
            const res = await fetch(`/${tipo}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email.value, password: pass.value })
            });
            const data = await res.json();
