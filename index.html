<div id="adminPanel" style="display: none;" class="card">
    <h2 style="color: #fbbf24;">👑 Painel Master (Administrador)</h2>
    <p>Lista de todos os usuários do sistema:</p>
    <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 13px;">
        <thead>
            <tr style="border-bottom: 1px solid #334155;">
                <th>E-mail</th>
                <th>Status Whats</th>
                <th>Msg Enviadas</th>
                <th>IA Configurada</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="userTable">
            </tbody>
    </table>
</div>

<script>
// No seu script de login, adicione:
async function auth(tipo) {
    // ... fetch normal ...
    if(data.token) {
        localStorage.setItem("token", data.token);
        localStorage.setItem("role", data.role); // Salva se é admin
        location.reload();
    }
}

async function loadAdminData() {
    if(localStorage.getItem("role") !== "admin") return;
    document.getElementById("adminPanel").style.display = "block";
    
    const res = await fetch("/admin/users", { headers: {"Authorization": localStorage.getItem("token")}});
    const users = await res.json();
    const table = document.getElementById("userTable");
    table.innerHTML = "";

    users.forEach(u => {
        table.innerHTML += `
            <tr style="border-bottom: 1px solid #334155;">
                <td>${u.email}</td>
                <td style="color: ${u.status === 'CONECTADO' ? '#22c55e' : '#ef4444'}">${u.status}</td>
                <td>${u.totalEnviados}</td>
                <td>${u.ia.substring(0,20)}...</td>
                <td><button onclick="editUser('${u._id}', '${u.email}', '${u.ia}')" style="padding:4px; font-size:10px;">Editar</button></td>
            </tr>
        `;
    });
}

async function editUser(id, email, ia) {
    const novoEmail = prompt("Novo e-mail:", email);
    const novaIA = prompt("Nova frase da IA:", ia);
    if(novoEmail && novaIA) {
        await fetch("/admin/edit-user", {
            method: "POST",
            headers: {"Content-Type": "application/json", "Authorization": localStorage.getItem("token")},
            body: JSON.stringify({ id, email: novoEmail, ia: novaIA })
        });
        loadAdminData();
    }
}

// Chame loadAdminData() dentro do seu window.onload
if(localStorage.getItem("token")) {
    loadAdminData();
}
</script>
