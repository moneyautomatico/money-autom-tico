<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Automático</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #22c55e; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-alt { background: #3b82f6; }
        #adminArea { display: none; border: 2px solid #fbbf24; text-align: left; }
        table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; border-bottom: 1px solid #444; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginBox" class="card">
            <h2 style="color: var(--primary)">🚀 Money Automático</h2>
            <input id="email" type="email" placeholder="E-mail">
            <input id="pass" type="password" placeholder="Senha">
            <button onclick="handleAuth('login')">Entrar</button>
            <button onclick="handleAuth('register')" class="btn-alt">Criar Conta Grátis</button>
        </div>

        <div id="mainDash" style="display: none;">
            <div class="card">
                <h3>Status: <span id="statusTxt">Carregando...</span></h3>
                <div id="qrcode" style="background:white; padding:10px; margin:15px auto; width:150px; display:none;"></div>
                <button onclick="localStorage.clear(); location.reload();" style="background:#ef4444; width:auto; padding:5px 15px;">Sair</button>
            </div>

            <div id="adminArea" class="card">
                <h3 style="color:#fbbf24">👑 Painel Master</h3>
                <table>
                    <thead><tr><th>E-mail</th><th>Whats</th><th>Envios</th></tr></thead>
                    <tbody id="userList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function handleAuth(tipo) {
            const res = await fetch(`/${tipo}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email.value, password: pass.value })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem("token", data.token);
                localStorage.setItem("role", data.role);
                location.reload();
            } else { alert(data.error || "Erro ao processar"); }
        }

        async function loadData() {
            const token = localStorage.getItem("token");
            if (!token) return;
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("mainDash").style.display = "block";

            // Status Whats
            const sRes = await fetch("/status-whatsapp", { headers: {"Authorization": token}});
            const sData = await sRes.json();
            const qrBox = document.getElementById("qrcode");
            if(sData.status === "CONECTADO") {
                document.getElementById("statusTxt").innerText = "✅ Conectado";
                qrBox.style.display = "none";
            } else if(sData.status.length > 50) {
                document.getElementById("statusTxt").innerText = "⚠️ Escaneie o QR";
                qrBox.style.display = "block";
                qrBox.innerHTML = "";
                new QRCode(qrBox, { text: sData.status, width: 150, height: 150 });
            }

            // Se for Admin
            if(localStorage.getItem("role") === "admin") {
                document.getElementById("adminArea").style.display = "block";
                const uRes = await fetch("/admin/users", { headers: {"Authorization": token}});
                const users = await uRes.json();
                document.getElementById("userList").innerHTML = users.map(u => `
                    <tr><td>${u.email}</td><td>${u.status}</td><td>${u.totalEnviados}</td></tr>
                `).join('');
            }
        }

        if(localStorage.getItem("token")) {
            loadData();
            setInterval(loadData, 10000);
        }
    </script>
</body>
</html>
