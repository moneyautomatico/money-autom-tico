<div class="card">
    <h3>🧠 Inteligência do Agente</h3>
    
    <label><b>Comportamento (Personalidade):</b></label>
    <textarea id="iaT" rows="2" placeholder="Ex: Seja um atendente calmo e use emojis."></textarea>
    
    <label><b>Lista de Aprendizagem (Fatos do seu Negócio):</b></label>
    <textarea id="baseT" rows="6" placeholder="Ex: 
- O preço é R$ 97
- Link: site.com/comprar
- Garantia de 7 dias
- Não aceitamos boleto"></textarea>
    
    <div style="display: flex; gap: 10px; margin-top:10px;">
        <div style="flex:1">
            <label>Delay (seg):</label>
            <input type="number" id="delayI" value="3">
        </div>
        <div style="flex:1">
            <label>Botão Geral:</label>
            <button id="btnOnOff" onclick="toggleBot()" style="padding:10px; margin-top:5px;">LIGADO</button>
        </div>
    </div>
    
    <button onclick="saveAll()" style="background:#25d366; margin-top:15px; font-size:16px;">Salvar Conhecimento 🚀</button>
</div>

<script>
    let botAtivo = true;

    async function toggleBot() {
        botAtivo = !botAtivo;
        const b = document.getElementById("btnOnOff");
        b.innerText = botAtivo ? "LIGADO" : "DESLIGADO";
        b.style.background = botAtivo ? "var(--p)" : "#ff4444";
    }

    async function saveAll() {
        const res = await fetch("/save-config", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': localStorage.getItem("tk")
            },
            body: JSON.stringify({
                iaResumo: document.getElementById("iaT").value,
                baseAprendizado: document.getElementById("baseT").value,
                botAtivo: botAtivo,
                delay: document.getElementById("delayI").value * 1000
            })
        });
        if(res.ok) alert("Agente atualizado com sucesso!");
    }

    // No carregamento inicial (dentro do if tk)
    if(localStorage.getItem("tk")) {
        const u = JSON.parse(localStorage.getItem("u"));
        document.getElementById("iaT").value = u.iaResumo || "";
        document.getElementById("baseT").value = u.baseAprendizado || "";
        // ... restante do código de sync
    }
</script>
