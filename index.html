<div class="card" style="border-top: 4px solid #6366f1;">
    <h3>🎫 Central de Suporte</h3>
    
    <div id="formTicket">
        <input id="tkAssunto" type="text" placeholder="Assunto (ex: Ativação Pix)">
        <textarea id="tkMensagem" placeholder="Descreva seu problema ou envie o comprovante..."></textarea>
        <button onclick="enviarTicket()" style="background:#6366f1">Abrir Chamado</button>
    </div>

    <hr style="margin:20px 0; border:0; border-top:1px solid #334155;">

    <div id="listaTickets" style="text-align:left; font-size:12px;">
        <p>Meus Chamados:</p>
        <div id="meusTickets"></div>
    </div>
</div>

<div id="adminTickets" class="card" style="border:2px solid #ef4444; display:none">
    <h3 style="color:#ef4444">📥 Chamados Pendentes</h3>
    <div id="adminListaTickets" style="text-align:left;"></div>
</div>

<script>
async function enviarTicket() {
    const assunto = document.getElementById("tkAssunto").value;
    const mensagem = document.getElementById("tkMensagem").value;
    const res = await fetch("/tickets/novo", {
        method: 'POST',
        headers: {'Content-Type':'application/json', 'Authorization': localStorage.getItem("token")},
        body: JSON.stringify({ assunto, mensagem })
    });
    if(res.ok) { alert("Ticket enviado!"); carregarTickets(); }
}

async function carregarTickets() {
    const res = await fetch("/tickets/meus", { headers: {"Authorization": localStorage.getItem("token")} });
    const data = await res.json();
    document.getElementById("meusTickets").innerHTML = data.map(t => `
        <div style="background:#0f172a; padding:10px; border-radius:8px; margin-bottom:8px; border-left: 3px solid ${t.status=='Aberto'?'#fbbf24':'#22c55e'}">
            <b>${t.assunto}</b> <span class="badge" style="float:right">${t.status}</span><br>
            <small>${t.mensagem}</small>
            ${t.resposta ? `<div style="margin-top:5px; color:#22c55e;"><b>Resp:</b> ${t.resposta}</div>` : ""}
        </div>
    `).join('');
}

// Funções exclusivas do ADMIN
async function carregarTicketsAdmin() {
    const res = await fetch("/admin/tickets", { headers: {"Authorization": localStorage.getItem("token")} });
    const data = await res.json();
    document.getElementById("adminListaTickets").innerHTML = data.map(t => `
        <div style="background:#1e293b; padding:10px; border-radius:8px; margin-bottom:10px;">
            <p>De: <b>${t.userName}</b> | Assunto: ${t.assunto}</p>
            <p style="font-size:12px;">"${t.mensagem}"</p>
            <input id="resp_${t._id}" type="text" placeholder="Escreva a resposta..." style="padding:5px;">
            <button onclick="responderTicket('${t._id}')" style="padding:5px; font-size:10px; width:auto;">Enviar Resposta</button>
        </div>
    `).join('');
}

async function responderTicket(id) {
    const resposta = document.getElementById(`resp_${id}`).value;
    await fetch("/admin/tickets/responder", {
        method: 'POST',
        headers: {'Content-Type':'application/json', 'Authorization': localStorage.getItem("token")},
        body: JSON.stringify({ id, resposta })
    });
    alert("Respondido!"); carregarTicketsAdmin();
}

// Chame estas funções no seu Update() inicial
if(localStorage.getItem("token")) {
    carregarTickets();
    if(localStorage.getItem("role") === "admin") {
        document.getElementById("adminTickets").style.display = "block";
        carregarTicketsAdmin();
    }
}
</script>
