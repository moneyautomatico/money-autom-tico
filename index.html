<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Partner | Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #00ff88; --b: #0b0f1a; --c: #161b2c; }
        body { background: var(--b); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .card { background: var(--c); border-radius: 12px; padding: 20px; margin: 15px; border: 1px solid #2d334a; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #0b0f1a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--p); font-weight: bold; cursor: pointer; color: #000; }
        
        /* MODAL E MONITOR */
        #waModal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; z-index: 1000; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px; border-radius: 10px; font-size: 13px; max-width: 80%; }
        .m-ia { align-self: flex-end; background: var(--p); color: black; }
        .m-us { align-self: flex-start; background: #2d334a; }
        
        #qrcode { background: white; padding: 15px; border-radius: 10px; margin: 20px auto; display: none; }
        #waWidget { position: fixed; right: 20px; bottom: 85px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="loginView" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="card" style="width: 320px; text-align: center;">
            <h2 style="color:var(--p)">Money Partner</h2>
            <input id="lEmail" placeholder="E-mail">
            <input id="lPass" type="password" placeholder="Senha">
            <button onclick="auth()">Entrar</button>
        </div>
    </div>

    <div id="dashView" style="display: none;">
        <div class="card">
            <h3 id="uNome">Carregando...</h3>
            <p style="font-size: 12px; color: #64748b;">Status: <span id="statusTxt">Verificando...</span></p>
        </div>

        <div class="card">
            <h3>🧠 Treinar sua IA</h3>
            <textarea id="iaTreino" placeholder="Ex: Se o cliente perguntar o preço, diga que custa R$ 97..."></textarea>
            <button onclick="saveTreino()">Salvar Comportamento</button>
        </div>

        <div id="waModal">
            <div style="padding:20px; display:flex; justify-content:space-between; background:var(--c); border-bottom:1px solid #2d334a;">
                <span>Conexão & Monitor</span>
                <button onclick="toggleWA()" style="width:auto; padding:5px 15px; background:#ef4444; color:white;">Fechar</button>
            </div>
            
            <div id="qrcode"></div>
            
            <div id="chatBox" class="chat-container"></div>
        </div>

        <div id="waWidget" onclick="toggleWA()">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
        </div>
    </div>

    <script>
        const qrG = new QRCode(document.getElementById("qrcode"), { width: 200, height: 200 });
        function toggleWA() { 
            const m = document.getElementById("waModal");
            m.style.display = m.style.display === "flex" ? "none" : "flex";
        }

        async function auth() {
            const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: lEmail.value, password: lPass.value}) });
            const d = await res.json();
            if(d.token) { 
                localStorage.setItem("tk", d.token); 
                localStorage.setItem("un", d.user.usuario); 
                location.reload(); 
            }
        }

        if(localStorage.getItem("tk")) {
            loginView.style.display = "none"; dashView.style.display = "block";
            uNome.innerText = "Olá, " + localStorage.getItem("un");

            // LOOP DE ATUALIZAÇÃO (A cada 4 segundos)
            setInterval(async () => {
                const res = await fetch("/sync", { headers: {"Authorization": localStorage.getItem("tk")} });
                const d = await res.json();
                
                const st = document.getElementById("statusTxt");
                const qrDiv = document.getElementById("qrcode");
                const box = document.getElementById("chatBox");

                if(d.status === "READY") {
                    st.innerText = "Conectado ✅"; st.style.color = "#00ff88";
                    qrDiv.style.display = "none";
                } else if(d.status.length > 50) {
                    st.innerText = "Aguardando Leitura ⚠️"; st.style.color = "#ffcc00";
                    qrDiv.style.display = "block";
                    qrG.makeCode(d.status); // GERA O QR CODE NA TELA
                }

                box.innerHTML = d.chats.map(c => `
                    <div class="bubble ${c.de==='IA'?'m-ia':'m-us'}">
                        <b>${c.de}:</b> ${c.txt} <br><small style="opacity:0.5">${c.hora || ''}</small>
                    </div>
                `).join('');
            }, 4000);
        }

        async function saveTreino() {
            await fetch("/set-ia", { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': localStorage.getItem("tk")}, body: JSON.stringify({txt: iaTreino.value}) });
            alert("IA Atualizada!");
        }
    </script>
</body>
</html>
