<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Partner | Live Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card: #161b2c; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #2d334a; margin: 15px; }
        
        /* Widget e Modal Corrigidos */
        #waWidget { position: fixed; right: 20px; bottom: 85px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 999; box-shadow: 0 0 20px rgba(37, 211, 102, 0.4); }
        #waModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 2000; flex-direction: column; }
        
        .monitor-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 13px; }
        .msg-in { background: #2d334a; align-self: flex-start; }
        .msg-out { background: var(--primary); color: #000; align-self: flex-end; }
        
        .qr-area { background: white; padding: 15px; border-radius: 10px; width: fit-content; margin: 20px auto; }
        button { background: var(--primary); border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div id="loginPage" style="display: flex; height: 100vh; align-items: center; justify-content: center;">
        <div class="card" style="width: 300px;">
            <h2 style="text-align: center;">Login</h2>
            <input id="email" type="email" placeholder="E-mail" style="width:100%; margin-bottom:10px; padding:10px; border-radius:5px; border:none;">
            <input id="pass" type="password" placeholder="Senha" style="width:100%; margin-bottom:15px; padding:10px; border-radius:5px; border:none;">
            <button onclick="login()">Entrar</button>
        </div>
    </div>

    <div id="dashPage" style="display: none;">
        <div class="card">
            <h3 id="nomeUser">Olá!</h3>
            <p style="color: #64748b;">O robô está processando mensagens em tempo real.</p>
        </div>

        <div id="waModal">
            <div style="padding: 20px; border-bottom: 1px solid #2d334a; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0;">Conexão & Monitor</h3>
                <button onclick="closeModal()" style="width: auto; padding: 5px 15px;">X</button>
            </div>
            
            <div id="qrContainer" class="qr-area" style="display: none;">
                <div id="qrcode"></div>
                <p style="color: #000; font-size: 12px; margin-top: 10px;">Escaneie para conectar</p>
            </div>

            <div id="chatMonitor" class="monitor-window">
                </div>
        </div>

        <div id="waWidget" onclick="openModal()">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
        </div>
    </div>

    <script>
        async function login() {
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: email.value, password: pass.value })
            });
            const data = await res.json();
            if(data.token) {
                localStorage.setItem("token", data.token);
                localStorage.setItem("userName", data.user.usuario);
                location.reload();
            }
        }

        function openModal() { document.getElementById("waModal").style.display = "flex"; }
        function closeModal() { document.getElementById("waModal").style.display = "none"; }

        if(localStorage.getItem("token")) {
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("dashPage").style.display = "block";
            document.getElementById("nomeUser").innerText = "Olá, " + localStorage.getItem("userName");

            setInterval(async () => {
                const r = await fetch("/monitor-wa", { headers: {"Authorization": localStorage.getItem("token")} });
                const d = await r.json();
                
                const qrDiv = document.getElementById("qrContainer");
                const chatDiv = document.getElementById("chatMonitor");

                if(d.status === "CONECTADO") {
                    qrDiv.style.display = "none";
                    // Atualiza o monitor de conversa
                    chatDiv.innerHTML = d.conversas.map(m => `
                        <div class="msg-bubble ${m.de === 'SISTEMA' ? 'msg-out' : 'msg-in'}">
                            <small style="opacity:0.6">${m.de}</small><br>${m.texto}
                        </div>
                    `).join('');
                } else if(d.status.length > 50) {
                    qrDiv.style.display = "block";
                    document.getElementById("qrcode").innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), {text: d.status, width: 200, height: 200});
                }
            }, 3000);
        }
    </script>
</body>
</html>
