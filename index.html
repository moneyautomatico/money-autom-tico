<div id="tab1" class="tab active">
    <div class="card">
        <h3>⚙️ Configuração e Aprendizado</h3>
        <label>Saudação da IA:</label>
        <textarea id="iaT" placeholder="Ex: Olá, sou o bot do suporte."></textarea>
        
        <label>Base de Conhecimento (O que ela deve saber):</label>
        <textarea id="baseT" placeholder="Cole aqui textos, preços, regras e informações que a IA usará para responder."></textarea>
        
        <label>Follow-up (15 min sem resposta):</label>
        <textarea id="followMsg" placeholder="Ainda está por aí?"></textarea>
        
        <button onclick="save()" style="background: var(--s); margin-top:15px;">SALVAR CONHECIMENTO E CONFIGS</button>
    </div>
</div>

<div id="tab2" class="tab">
    <div class="card">
        <h3>🚀 Disparador Ativo</h3>
        <textarea id="numM" placeholder="Um número por linha (com DDD)"></textarea>
        <textarea id="msgM" placeholder="Texto do disparo"></textarea>
        <input type="number" id="intM" value="30" title="Intervalo em segundos">
        <button onclick="disparar()">LANÇAR DISPAROS AGORA</button>
    </div>
</div>

<script>
async function save() {
    const payload = {
        iaResumo: document.getElementById("iaT").value,
        baseAprendizado: document.getElementById("baseT").value,
        msgFollowUp: document.getElementById("followMsg").value,
        followUpAtivo: true, // Forçamos como ativo para você testar
        delayResponda: 3000
    };
    
    const res = await fetch("/save-config", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': localStorage.getItem("tk")
        },
        body: JSON.stringify(payload)
    });
    if(res.ok) alert("Conhecimento salvo! A IA já está usando sua base.");
}

async function disparar() {
    const payload = {
        numeros: document.getElementById("numM").value,
        mensagem: document.getElementById("msgM").value,
        intervalo: document.getElementById("intM").value
    };
    
    const res = await fetch("/disparar", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': localStorage.getItem("tk")
        },
        body: JSON.stringify(payload)
    });
    const d = await res.json();
    alert(d.msg || d.error);
}
</script>
