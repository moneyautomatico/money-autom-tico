<div id="loginBox" style="text-align: center; margin-top: 100px;">
    <div class="box" style="display: inline-block; width: 350px;">
        <h2>🚀 Money Automático</h2>
        <input id="email" placeholder="E-mail">
        <input id="senha" type="password" placeholder="Senha">
        <button onclick="login()">Entrar</button>
        <button onclick="register()" style="background:#3b82f6; margin-top:10px;">Criar Nova Conta</button>
    </div>
</div>

<script>
async function register() {
    const res = await fetch("/register", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ email: email.value, password: senha.value })
    });
    const data = await res.json();
    alert(data.msg || data.error);
}
// Mantenha o restante das funções de login e painel que já enviamos
</script>
