<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Partner | Conexão</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card: #161b2c; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .card { background: var(--card); border-radius: 15px; padding: 25px; margin: 20px; border: 1px solid #2d334a; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #2d334a; background: #0b0f1a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--primary); color: black; font-weight: bold; cursor: pointer; }
        
        /* Widget Flutuante */
        #waBtn { position: fixed; right: 20px; bottom: 20px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 100; }
        
        /* Janela de Conexão */
        #waModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 20px; text-align: center; max-width: 90%; }
        #qrcode { background: white; padding: 15px; border-radius: 10px; margin: 20px auto; display: inline-block; }
    </style>
</head>
<body>

    <div id="loginView" style="display: flex; height: 100vh; align-items: center; justify-content: center;">
        <div class="card" style="width: 320px;">
            <h2 style="text-align: center; color: var(--primary);">Money Partner</h2>
            <input id="email" type="email" placeholder="Seu e-mail">
            <input id="pass" type="password" placeholder="Sua senha">
            <button onclick="fazerLogin()">Entrar no Sistema</button>
        </div>
    </div>

    <div id="mainView" style="display: none;">
        <div class="card">
            <h2 id="txtNome">Olá!</h2>
            <p style="color: #64748b;">Clique no botão verde no canto para conectar seu WhatsApp.</p>
        </div>

        <div id="waBtn" onclick="abrirModal()">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
        </div>

        <div id="waModal">
            <div class="modal-content">
                <h3 id="waStatus">Iniciando...</h3>
                <div id="qrcode"></div>
                <button onclick="fecharModal()" style="background: #334155; color: white;">Fechar Janela</button>
            </div>
        </div>
    </div>

    <script>
        const qrcodeGen = new QRCode(document.getElementById("qrcode"), { width: 200, height: 200 });

        async function fazerLogin() {
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: email.value, password: pass.value })
            });
            const data = await res.json();
            if(data.token) {
                localStorage.setItem("token", data.token);
                localStorage.setItem("userName", data.user.usuario || "Usuário");
                location.reload();
            } else { alert("Erro no login!"); }
        }

        function abrirModal() { document.getElementById("waModal").style.display = "flex"; }
        function fecharModal() { document.getElementById("waModal").style.display = "none"; }

        if(localStorage.getItem("token")) {
            document.getElementById("loginView").style.display = "none";
            document.getElementById("mainView").style.display = "block";
            document.getElementById("txtNome").innerText = "Olá, " + localStorage.getItem("userName") + "!";

            setInterval(async () => {
                const r = await fetch("/status-wa", { headers: {"Authorization": localStorage.getItem("token")} });
                const d = await r.json();
                const statusTxt = document.getElementById("waStatus");
                const qrDiv = document.getElementById("qrcode");

                if(d.status === "CONECTADO") {
                    statusTxt.innerText = "✅ WhatsApp Conectado!";
                    statusTxt.style.color = "#00ff88";
                    qrDiv.style.display = "none";
                } else if(d.status.length > 50) {
                    statusTxt.innerText = "Escaneie o QR Code:";
                    qrDiv.style.display = "block";
                    qrcodeGen.clear();
                    qrcodeGen.makeCode(d.status);
                } else {
                    statusTxt.innerText = "Gerando QR Code...";
                }
            }, 4000);
        }
    </script>
</body>
</html>
