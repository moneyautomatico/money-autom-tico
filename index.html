<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Partner | Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #00ff88; --b: #0b141a; --c: #1d272e; --s: #25d366; --t: #e9edef; }
        body { background: var(--b); color: var(--t); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .card { background: var(--c); border-radius: 12px; padding: 20px; margin: 15px; border: 1px solid #303d45; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #303d45; background: #2a3942; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--p); font-weight: bold; cursor: pointer; color: #0b141a; }
        
        /* Barra de Progresso Moderna */
        .progress-container { background: #2a3942; border-radius: 10px; height: 12px; width: 100%; margin: 15px 0; overflow: hidden; display: none; }
        .progress-bar { background: var(--p); height: 100%; width: 0%; transition: width 0.5s ease; box-shadow: 0 0 10px var(--p); }
        
        .status-info { font-size: 13px; margin-top: 5px; display: flex; justify-content: space-between; opacity: 0.8; }
        .log-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #303d45; font-size: 11px; }
        
        nav { position: fixed; bottom: 0; width: 100%; background: #202c33; display: flex; height: 70px; border-top: 1px solid #303d45; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; opacity: 0.4; }
        .nav-item.active { opacity: 1; color: var(--p); }
        .tab { display: none; } .tab.active { display: block; }
        
        #mirrorView { position: fixed; inset: 0; background: var(--b); display: none; flex-direction: column; z-index: 9999; }
        .chat-scroll { flex: 1; overflow-y: auto; padding: 20px; background-color: rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 8px; }
        .m-bubble { padding: 10px; border-radius: 8px; max-width: 80%; font-size: 13px; }
        .m-ia { align-self: flex-end; background: #005c4b; }
        .m-us { align-self: flex-start; background: #202c33; }
    </style>
</head>
<body>

    <div id="authV" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="card" style="width: 320px; text-align: center;">
            <h2 style="color: var(--p);">Money Partner</h2>
            <input id="lEmail" placeholder="E-mail">
            <input id="lPass" type="password" placeholder="Senha">
            <button onclick="login()">ACESSAR PAINEL</button>
        </div>
    </div>

    <div id="dashV" style="display: none;">
        <div id="tab1" class="tab active">
            <div class="card">
                <h3 style="color: var(--p);">⚙️ Inteligência Offline</h3>
                <textarea id="iaT" rows="2" placeholder="Saudação"></textarea>
                <textarea id="baseT" rows="5" placeholder="Instruções da IA"></textarea>
                <button onclick="save()" style="background: var(--s);">SALVAR CONFIGURAÇÕES</button>
                <button onclick="logoutApp()" style="margin-top:10px; background: transparent; border:1px solid #444; color:white;">SAIR</button>
            </div>
        </div>

        <div id="tab2" class="tab">
            <div class="card">
                <h3 style="color: var(--p);">🚀 Central de Disparo</h3>
                <textarea id="numM" rows="4" placeholder="Lista de Números (Um por linha)"></textarea>
                <textarea id="msgM" rows="3" placeholder="Sua mensagem aqui..."></textarea>
                <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
                    <div style="flex: 1;">
                        <label style="font-size: 11px; opacity: 0.6;">Intervalo (Seg)</label>
                        <input type="number" id="intM" value="30">
                    </div>
                    <button onclick="disparar()" style="flex: 2; height: 45px;">LANÇAR CAMPANHA</button>
                </div>

                <div id="progArea" class="progress-container">
                    <div id="progBar" class="progress-bar"></div>
                </div>
                <div id="statusTxt" style="text-align: center; font-size: 12px; color: var(--p); font-weight: bold;"></div>
            </div>

            <div class="card" style="max-height: 200px; overflow-y: auto;">
                <h4 style="margin:0 0 10px 0; font-size:13px;">📋 Últimos Envios</h4>
                <div id="logLista"></div>
            </div>
        </div>

        <div id="mirrorView">
            <div style="padding:15px; background:#202c33; display:flex; justify-content:space-between; align-items:center;">
                <b>Monitor Offline</b> <button onclick="closeMonitor()" style="background:red; color:white; padding:5px 10px; border-radius:5px;">X</button>
            </div>
            <div id="qrcode" style="background:white; margin:10px auto; padding:10px; border-radius:10px;"></div>
            <div id="chatBox" class="chat-scroll"></div>
        </div>

        <nav>
            <div class="nav-item active" onclick="nav('tab1', this)">⚙️ Config</div>
            <div class="nav-item" onclick="nav('tab2', this)">🚀 Disparo</div>
            <div class="nav-item" onclick="openMonitor()">📱 Monitor</div>
        </nav>
    </div>

    <script>
        const qrG = new QRCode(document.getElementById("qrcode"), { width: 200, height: 200 });
        function nav(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'tab2') { atualizarLogs(); monitorarProgresso(); }
        }

        async function login() {
            const res = await fetch("/login", { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: lEmail.value, password: lPass.value}) });
            if(res.ok) {
                const d = await res.json();
                localStorage.setItem("tk", d.token); localStorage.setItem("u", JSON.stringify(d.user)); location.reload();
            } else alert("Erro no acesso.");
        }

        if(localStorage.getItem("tk")) {
            authV.style.display = "none"; dashV.style.display = "block";
            const u = JSON.parse(localStorage.getItem("u"));
            iaT.value = u.iaResumo; baseT.value = u.baseAprendizado;

            // Sync contínuo
            setInterval(async () => {
                const res = await fetch("/sync", { headers: {"Authorization": localStorage.getItem("tk")} });
                const d = await res.json();
                if(d.status.length > 50) { qrcode.style.display='block'; qrG.makeCode(d.status); }
                else qrcode.style.display='none';
                chatBox.innerHTML = d.chats.map(c => `<div class="m-bubble ${c.tipo==='enviada'?'m-ia':'m-us'}">${c.txt}</div>`).join('');
                if(document.getElementById('tab2').classList.contains('active')) monitorarProgresso();
            }, 3000);
        }

        async function disparar() {
            const res = await fetch("/disparar", { 
                method:'POST', headers:{'Content-Type':'application/json', 'Authorization':localStorage.getItem("tk")}, 
                body: JSON.stringify({ numeros: numM.value, mensagem: msgM.value, intervalo: intM.value }) 
            });
            const d = await res.json();
            if(d.error) alert(d.error);
            else { progArea.style.display = 'block'; monitorarProgresso(); }
        }

        async function monitorarProgresso() {
            const res = await fetch("/progresso", { headers: {"Authorization": localStorage.getItem("tk")} });
            const p = await res.json();
            if(p.status === 'rodando' || p.status === 'finalizado') {
                progArea.style.display = 'block';
                const perc = (p.atual / p.total) * 100;
                progBar.style.width = perc + "%";
                statusTxt.innerText = `${p.msg} (${p.atual}/${p.total})`;
                if(p.status === 'finalizado') setTimeout(() => { progArea.style.display = 'none'; statusTxt.innerText = ''; }, 5000);
            }
        }

        async function atualizarLogs() {
            const res = await fetch("/logs-envio", { headers: {"Authorization": localStorage.getItem("tk")} });
            const logs = await res.json();
            logLista.innerHTML = logs.map(l => `<div class="log-row"><span>${l.numero}</span><span>${l.status}</span></div>`).join('');
        }

        async function save() {
            await fetch("/save-config", { 
                method:'POST', headers:{'Content-Type':'application/json', 'Authorization':localStorage.getItem("tk")}, 
                body: JSON.stringify({ iaResumo: iaT.value, baseAprendizado: baseT.value }) 
            });
            alert("Configurações Salvas!");
        }

        function openMonitor() { mirrorView.style.display = 'flex'; }
        function closeMonitor() { mirrorView.style.display = 'none'; }
        function logoutApp() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
