<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Partner | Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --p: #00ff88; --b: #0b141a; --c: #1d272e; --s: #25d366; --t: #e9edef; }
        body { background: var(--b); color: var(--t); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .card { background: var(--c); border-radius: 12px; padding: 20px; margin: 15px; border: 1px solid #303d45; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #303d45; background: #2a3942; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--p); font-weight: bold; cursor: pointer; color: #0b141a; margin-bottom: 10px; }
        .btn-danger { background: #ff4b4b; color: white; }
        .btn-outline { background: transparent; border: 1px solid #444; color: white; }
        nav { position: fixed; bottom: 0; width: 100%; background: #202c33; display: flex; height: 70px; border-top: 1px solid #303d45; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; opacity: 0.4; }
        .nav-item.active { opacity: 1; color: var(--p); }
        .tab { display: none; } .tab.active { display: block; }
        #mirrorView { position: fixed; inset: 0; background: var(--b); display: none; flex-direction: column; z-index: 9999; }
        .chat-scroll { flex: 1; overflow-y: auto; padding: 20px; background-color: rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 10px; }
        #qrcode { background: white; padding: 10px; margin: 20px auto; width: fit-content; border-radius: 8px; }
        /* Estilo da Tabela de Logs */
        .log-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #303d45; font-size: 12px; }
    </style>
</head>
<body>

    <div id="authV" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div id="loginBox" class="card" style="width: 320px; text-align: center;">
            <h2 style="color: var(--p);">Money Partner</h2>
            <input id="lEmail" placeholder="E-mail">
            <input id="lPass" type="password" placeholder="Senha">
            <button onclick="login()">ENTRAR</button>
            <p onclick="toggleAuth(true)" style="font-size: 12px; cursor: pointer; opacity: 0.6;">Criar nova conta</p>
        </div>
        <div id="regBox" class="card" style="width: 320px; text-align: center; display: none;">
            <h2 style="color: var(--p);">Novo Cadastro</h2>
            <input id="rEmail" placeholder="E-mail">
            <input id="rPass" type="password" placeholder="Senha">
            <button onclick="register()">CADASTRAR</button>
            <p onclick="toggleAuth(false)" style="font-size: 12px; cursor: pointer; opacity: 0.6;">Voltar ao Login</p>
        </div>
    </div>

    <div id="dashV" style="display: none;">
        <div id="tab1" class="tab active">
            <div class="card">
                <h3 style="color: var(--p);">⚙️ Configurações</h3>
                <textarea id="iaT" rows="2" placeholder="Saudação"></textarea>
                <textarea id="baseT" rows="5" placeholder="Base de Conhecimento"></textarea>
                <textarea id="followMsg" rows="2" placeholder="Mensagem Follow-up (15 min)"></textarea>
                <button onclick="save()" style="background: var(--s);">SALVAR CONFIGURAÇÕES</button>
                <button onclick="logoutWA()" class="btn-danger">DESCONECTAR WHATSAPP</button>
                <button onclick="logoutApp()" class="btn-outline">SAIR DO PAINEL</button>
            </div>
        </div>

        <div id="tab2" class="tab">
            <div class="card">
                <h3 style="color: var(--p);">🚀 Disparador</h3>
                <textarea id="numM" rows="4" placeholder="Números (um por linha)"></textarea>
                <textarea id="msgM" rows="3" placeholder="Mensagem"></textarea>
                <button onclick="disparar()">LANÇAR CAMPANHA</button>
            </div>
            <div class="card" style="max-height: 250px; overflow-y: auto;">
                <h4 style="margin:0 0 10px 0; color:var(--p)">📋 Detalhes de Envio</h4>
                <div id="logLista">Carregando relatórios...</div>
            </div>
        </div>

        <div id="mirrorView">
            <div style="padding:15px; background:#202c33; display:flex; justify-content:space-between; align-items:center;">
                <b>Monitor</b> <button onclick="closeMonitor()" style="width:auto; background:red; color:white; padding:5px 10px;">X</button>
            </div>
            <div id="qrcode"></div>
            <div id="chatBox" class="chat-scroll"></div>
        </div>

        <nav>
            <div class="nav-item active" onclick="nav('tab1', this)">⚙️ Config</div>
            <div class="nav-item" onclick="nav('tab2', this)">🚀 Disparo</div>
            <div class="nav-item" onclick="openMonitor()">📱 Monitor</div>
        </nav>
    </div>

    <script>
        const qrG = new QRCode(document.getElementById("qrcode"), { width: 220, height: 220 });
        function toggleAuth(reg) { loginBox.style.display = reg ? 'none' : 'block'; regBox.style.display = reg ? 'block' : 'none'; }
        function openMonitor() { document.getElementById("mirrorView").style.display = 'flex'; }
        function closeMonitor() { document.getElementById("mirrorView").style.display = 'none'; }
        function nav(id, el) { 
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'tab2') atualizarLogs();
        }

        async function register() {
            const res = await fetch("/register", { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: rEmail.value, password: rPass.value}) });
            if(res.ok) { alert("Sucesso! Faça o login."); toggleAuth(false); }
        }

        async function login() {
            const res = await fetch("/login", { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email: lEmail.value, password: lPass.value}) });
            if(res.ok) {
                const d = await res.json();
                localStorage.setItem("tk", d.token); localStorage.setItem("u", JSON.stringify(d.user)); location.reload();
            } else { alert("Login incorreto."); }
        }

        function logoutApp() { localStorage.clear(); location.reload(); }
        async function logoutWA() { if(confirm("Desconectar Zap?")) { await fetch("/logout-wa", { headers: {"Authorization": localStorage.getItem("tk")}, method: 'POST' }); location.reload(); } }

        if(localStorage.getItem("tk")) {
            authV.style.display = "none"; dashV.style.display = "block";
            const u = JSON.parse(localStorage.getItem("u"));
            iaT.value = u.iaResumo || ""; baseT.value = u.baseAprendizado || ""; followMsg.value = u.msgFollowUp || "";

            setInterval(async () => {
                const res = await fetch("/sync", { headers: {"Authorization": localStorage.getItem("tk")} });
                if(res.ok) {
                    const d = await res.json();
                    if(d.status.length > 50) { document.getElementById("qrcode").style.display = 'block'; qrG.makeCode(d.status); }
                    else { document.getElementById("qrcode").style.display = 'none'; }
                    chatBox.innerHTML = d.chats.map(c => `<div style="padding:10px; background:#202c33; border-radius:8px; margin-bottom:5px;">${c.txt}</div>`).join('');
                }
            }, 4000);
        }

        async function save() {
            await fetch("/save-config", { 
                method:'POST', headers:{'Content-Type':'application/json', 'Authorization':localStorage.getItem("tk")}, 
                body: JSON.stringify({ iaResumo: iaT.value, baseAprendizado: baseT.value, msgFollowUp: followMsg.value }) 
            });
            alert("Salvo!");
        }

        async function disparar() {
            const res = await fetch("/disparar", { 
                method:'POST', headers:{'Content-Type':'application/json', 'Authorization':localStorage.getItem("tk")}, 
                body: JSON.stringify({ numeros: numM.value, mensagem: msgM.value, intervalo: 30 }) 
            });
            const d = await res.json(); alert(d.msg || d.error);
            atualizarLogs();
        }

        async function atualizarLogs() {
            const res = await fetch("/logs-envio", { headers: {"Authorization": localStorage.getItem("tk")} });
            if(res.ok) {
                const logs = await res.json();
                document.getElementById("logLista").innerHTML = logs.map(l => `
                    <div class="log-row">
                        <span>${l.numero}</span>
                        <span>${l.status}</span>
                        <span style="opacity:0.5">${new Date(l.data).toLocaleTimeString()}</span>
                    </div>
                `).join('') || "Nenhum envio registrado.";
            }
        }
    </script>
</body>
</html>
