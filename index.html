<div id="dash" style="display: none;">
    <div class="card" id="cardTeste" style="border-bottom: 3px solid var(--gold); display:none;">
        <p style="font-size: 12px; color: var(--gold); margin: 0;">⏳ SEU TESTE GRÁTIS EXPIRE EM:</p>
        <h2 id="countdown" style="margin: 5px 0; color: #fff;">02:00:00</h2>
    </div>
    
    <div class="card">
        <h3>💎 Sua Conexão</h3>
        </div>
</div>

<script>
    // FUNÇÃO PARA O CRONÔMETRO NO FRONTEND
    function iniciarCronometro(dataCadastro) {
        const display = document.getElementById("countdown");
        const card = document.getElementById("cardTeste");
        card.style.display = "block";

        const updateTimer = () => {
            const agora = new Date();
            const inicio = new Date(dataCadastro);
            const expira = new Date(inicio.getTime() + 2 * 60 * 60 * 1000);
            const diff = expira - agora;

            if (diff <= 0) {
                display.innerText = "EXPIRADO";
                alert("Seu teste grátis acabou! Ative sua conta agora.");
                localStorage.clear(); location.reload();
                return;
            }

            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            display.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        setInterval(updateTimer, 1000);
        updateTimer();
    }

    // NA FUNÇÃO HANDLEAUTH, QUANDO RECEBER O LOGIN:
    if(data.token) { 
        localStorage.setItem("token", data.token); 
        localStorage.setItem("expiracao", data.expiracao); // Salva a data de início
        location.reload(); 
    } else if(data.error === "EXPIRADO") {
        document.getElementById("suporteLogin").style.display = "block";
        document.getElementById("suporteLogin").innerHTML = `
            <p style="color:#f87171">❌ Seu teste grátis de 2 horas acabou!</p>
            <button class="btn-suporte" onclick="abrirSuporte()">Ativar Acesso Vitalício (R$ 30)</button>
        `;
    }

    // NA FUNÇÃO UPDATE(), CHAME O CRONÔMETRO
    const exp = localStorage.getItem("expiracao");
    if(exp && localStorage.getItem("role") !== "admin") {
        iniciarCronometro(exp);
    }
</script>
