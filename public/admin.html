<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Money Automático</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body style="background:#0f172a; color:white; text-align:center; font-family: sans-serif; padding: 20px;">

    <h1>👑 Painel Administrativo</h1>

    <div id="loginSection">
        <input id="emailInput" placeholder="Email" style="padding:10px; margin:5px; border-radius:5px; border:none;"><br>
        <input id="senhaInput" type="password" placeholder="Senha" style="padding:10px; margin:5px; border-radius:5px; border:none;"><br>
        <button onclick="login()" style="padding:10px 20px; cursor:pointer; background:#22c55e; color:white; border:none; border-radius:5px; font-weight:bold;">Entrar no Sistema</button>
    </div>

    <div id="painel" style="display:none; margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px;">
        <h2>Status do Sistema</h2>
        
        <div id="statusWhatsApp" style="background:#1e293b; padding:20px; border-radius:10px; display:inline-block; min-width: 300px;">
            <p>WhatsApp: <span id="textoStatus">Verificando...</span></p>
            <div id="qrcode" style="background:white; padding:10px; display:none; margin: 0 auto; width: fit-content;"></div>
            <p id="msgConectado" style="color:#22c55e; display:none; font-weight:bold;">✅ DISPOSITIVO PAREADO</p>
        </div>

        <div style="margin-top:20px;">
            <h3>Ações Rápidas</h3>
            <button onclick="verificarConexao()" style="padding:8px; cursor:pointer;">Atualizar Status</button>
            <button onclick="logout()" style="padding:8px; cursor:pointer; background:#ef4444; color:white; border:none; border-radius:5px;">Sair</button>
        </div>
    </div>

    <script>
        let token = "";

        // Função de Login sincronizada com o server.js
        async function login() {
            const email = document.getElementById("emailInput").value;
            const password = document.getElementById("senhaInput").value;

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ email, password }) // Enviando 'password' como o servidor espera
                });

                const data = await res.json();

                if (data.error) {
                    return alert("Erro: " + data.error);
                }

                token = data.token;
                localStorage.setItem("token_money", token); // Salva para não deslogar no F5
                
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("painel").style.display = "block";
                
                verificarConexao();
                // Verifica o status a cada 10 segundos automaticamente
                setInterval(verificarConexao, 10000);

            } catch (err) {
                alert("Erro ao conectar com o servidor.");
            }
        }

        async function verificarConexao() {
            if (!token) return;

            try {
                const res = await fetch("/status-whatsapp", {
                    headers: { "Authorization": token }
                });
                const data = await res.json();
                
                const qrcodeDiv = document.getElementById("qrcode");
                const textoStatus = document.getElementById("textoStatus");
                const msgConectado = document.getElementById("msgConectado");

                if (data.status === "CONECTADO") {
                    textoStatus.innerText = "Conectado!";
                    qrcodeDiv.style.display = "none";
                    msgConectado.style.display = "block";
                } else if (data.status === "" || !data.status) {
                    textoStatus.innerText = "Iniciando WhatsApp...";
                    qrcodeDiv.style.display = "none";
                } else {
                    textoStatus.innerText = "Escaneie o QR Code abaixo:";
                    msgConectado.style.display = "none";
                    qrcodeDiv.style.display = "block";
                    
                    // Limpa o QR anterior e gera o novo
                    qrcodeDiv.innerHTML = "";
                    new QRCode(qrcodeDiv, {
                        text: data.status,
                        width: 256,
                        height: 256
                    });
                }
            } catch (err) {
                console.error("Erro ao buscar status:", err);
            }
        }

        function logout() {
            localStorage.removeItem("token_money");
            location.reload();
        }

        // Tenta recuperar sessão ao abrir a página
        window.onload = () => {
            const salvo = localStorage.getItem("token_money");
            if (salvo) {
                token = salvo;
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("painel").style.display = "block";
                verificarConexao();
                setInterval(verificarConexao, 10000);
            }
        }
    </script>
</body>
</html>
