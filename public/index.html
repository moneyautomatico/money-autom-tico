<!DOCTYPE html>
<html>
<head>
  <title>Money Automático</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .box {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #1e293b;
      display: inline-block;
      border-radius: 10px;
    }

    input, textarea {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      width: 250px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🚀 Money Automático</h1>

<div id="authArea">
  <div class="box">
    <h3>Login</h3>
    <input id="email"><br>
    <input id="senha" type="password"><br>
    <button onclick="login()">Entrar</button>
  </div>

  <div class="box">
    <h3>Criar Conta</h3>
    <input id="email_reg"><br>
    <input id="senha_reg" type="password"><br>
    <button onclick="register()">Cadastrar</button>
  </div>
</div>

<div id="appArea" style="display:none;">

  <!-- 🔥 NOVO BOTÃO -->
  <button onclick="mostrarID()">🔗 Conectar WhatsApp</button>

  <div class="box">
    <h3>📤 Disparo</h3>
    <input id="numeros"><br>
    <input id="mensagem"><br>
    <button onclick="enviar()">Disparar</button>
  </div>

  <div class="box">
    <h3>🤖 Treinar IA</h3>
    <textarea id="iaTexto"></textarea><br>
    <button onclick="salvarIA()">Salvar</button>
    <button onclick="carregarIA()">Carregar</button>
  </div>

  <div id="adminPanel" class="box" style="display:none;">
    <h3>👑 Admin</h3>
    <button onclick="carregarUsuarios()">Ver usuários</button>
    <ul id="listaUsuarios"></ul>
  </div>

  <button onclick="logout()">Sair</button>

</div>

<script>

let token = "";
let isAdmin = false;
let user_id = "";

// 🔐 LOGIN
async function login() {
  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email.value,
      senha: senha.value
    })
  });

  const data = await res.json();

  if (!data.token) return alert(data.erro);

  token = data.token;
  isAdmin = data.admin;
  user_id = data.user_id; // 🔥 NOVO

  authArea.style.display = "none";
  appArea.style.display = "block";

  if (isAdmin) adminPanel.style.display = "block";
}

// 👤 REGISTRO
async function register() {
  const res = await fetch("/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email_reg.value,
      senha: senha_reg.value
    })
  });

  const data = await res.json();
  alert(data.msg || data.erro);
}

// 📤 DISPARO
async function enviar() {
  const res = await fetch("/campanha", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      numeros: numeros.value.split(","),
      mensagem: mensagem.value
    })
  });

  const data = await res.json();
  alert(data.msg);
}

// 🤖 SALVAR IA
async function salvarIA() {
  const res = await fetch("/ia/salvar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ texto: iaTexto.value })
  });

  const data = await res.json();
  alert(data.msg);
}

// 🤖 CARREGAR IA
async function carregarIA() {
  const res = await fetch("/ia", {
    headers: { "Authorization": token }
  });

  const data = await res.json();
  iaTexto.value = data.texto;
}

// 👑 ADMIN
async function carregarUsuarios() {
  const res = await fetch("/admin/users", {
    headers: { "Authorization": token }
  });

  const data = await res.json();

  listaUsuarios.innerHTML = "";
  data.forEach(u => {
    listaUsuarios.innerHTML += `<li>${u.email}</li>`;
  });
}

// 🔗 NOVA FUNÇÃO
function mostrarID() {
  alert("Seu ID: " + user_id);
}

// 🚪 LOGOUT
function logout() {
  location.reload();
}

</script>

</body>
</html>
