<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Money Automático</title>

  <style>
    body {
      background: #0b1a33;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .box {
      background: #12264d;
      padding: 20px;
      border-radius: 10px;
      margin: 20px auto;
      width: 300px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #2ecc71;
      border: none;
      padding: 10px 20px;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🚀 Money Automático</h1>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel" style="display:none;">

  <h3 id="userId"></h3>

  <div class="box">
    <h3>📤 Disparo</h3>
    <input id="numeros" placeholder="Números separados por vírgula">
    <input id="mensagem" placeholder="Mensagem">
    <button onclick="disparar()">Disparar</button>
  </div>

  <div class="box">
    <h3>🤖 Treinar IA</h3>
    <input id="textoIA" placeholder="Texto da IA">
    <button onclick="salvarIA()">Salvar</button>
    <button onclick="carregarIA()">Carregar</button>
  </div>

  <button onclick="logout()">Sair</button>

</div>

<script>

async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const res = await fetch("/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, senha })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    localStorage.setItem("user_id", data.user_id);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("painel").style.display = "block";

    document.getElementById("userId").innerText = "Seu ID: " + data.user_id;

  } else {
    alert(data.erro || "Erro no login");
  }
}

// 🔥 AUTO LOGIN
window.onload = () => {
  const token = localStorage.getItem("token");
  const user_id = localStorage.getItem("user_id");

  if (token) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("painel").style.display = "block";

    document.getElementById("userId").innerText = "Seu ID: " + user_id;
  }
};

// 📤 DISPARO
async function disparar() {
  const numeros = document.getElementById("numeros").value;
  const mensagem = document.getElementById("mensagem").value;

  const token = localStorage.getItem("token");

  await fetch("/campanha", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ numeros, mensagem })
  });

  alert("Disparo enviado!");
}

// 🤖 SALVAR IA
async function salvarIA() {
  const texto = document.getElementById("textoIA").value;
  const token = localStorage.getItem("token");

  await fetch("/ia/salvar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ texto })
  });

  alert("IA salva!");
}

// 🤖 CARREGAR IA
async function carregarIA() {
  const token = localStorage.getItem("token");

  const res = await fetch("/ia", {
    headers: {
      "Authorization": token
    }
  });

  const data = await res.json();

  document.getElementById("textoIA").value = data.texto;
}

// 🚪 LOGOUT
function logout() {
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
