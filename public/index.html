<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Money Automático</title>
    <style>
        body { background:#0f172a; color:white; font-family:sans-serif; text-align:center; padding:20px; }
        .box { background:#1e293b; padding:20px; border-radius:10px; display:inline-block; margin:10px; width:300px; }
        input { padding:10px; margin:5px 0; border-radius:5px; border:none; width:90%; background:#0f172a; color:white; }
        button { padding:10px; border-radius:5px; border:none; background:#22c55e; color:white; cursor:pointer; width:100%; font-weight:bold; }
    </style>
</head>
<body>
    <h1>🚀 Money Automático</h1>

    <div id="loginBox">
        <div class="box">
            <h3>Login</h3>
            <input id="email" placeholder="Email">
            <input id="senha" type="password" placeholder="Senha">
            <button onclick="login()">Entrar</button>
        </div>
    </div>

    <div id="painel" style="display:none;">
        <div class="box">
            <h3>📤 Disparos</h3>
            <input id="numeros" placeholder="Números (com DDD)">
            <input id="msg" placeholder="Mensagem">
            <button onclick="disparar()">Enviar Agora</button>
        </div>
        <div class="box">
            <h3>🤖 Config IA</h3>
            <input id="txtIA">
            <button onclick="salvarIA()">Salvar IA</button>
        </div>
        <br><button onclick="localStorage.clear();location.reload()" style="width:100px;background:#ef4444">Sair</button>
    </div>

    <script>
        async function login() {
            const res = await fetch("/login", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({ email: email.value, password: senha.value })
            });
            const data = await res.json();
            if(data.token) {
                localStorage.setItem("token", data.token);
                location.reload();
            } else { alert("Erro: " + data.error); }
        }

        window.onload = async () => {
            const token = localStorage.getItem("token");
            if(token) {
                document.getElementById("loginBox").style.display="none";
                document.getElementById("painel").style.display="block";
                const res = await fetch("/carregar-ia", { headers:{"Authorization":token}});
                const data = await res.json();
                document.getElementById("txtIA").value = data.texto;
            }
        };

        async function disparar() {
            const res = await fetch("/disparo", {
                method:"POST",
                headers:{"Content-Type":"application/json", "Authorization":localStorage.getItem("token")},
                body: JSON.stringify({ numeros: numeros.value, mensagem: msg.value })
            });
            const data = await res.json();
            alert(data.ok ? "Enviado!" : "Erro");
        }

        async function salvarIA() {
            await fetch("/salvar-ia", {
                method:"POST",
                headers:{"Content-Type":"application/json", "Authorization":localStorage.getItem("token")},
                body: JSON.stringify({ texto: txtIA.value })
            });
            alert("Salvo!");
        }
    </script>
</body>
</html>
