<!DOCTYPE html>
<html>
<head>
<title>Money Automático</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
.box { margin-top:20px; padding:20px; border:1px solid #1e293b; border-radius:10px; display:inline-block; }
input { padding:10px; margin:5px; border-radius:5px; border:none; width:250px; }
button { padding:10px; margin:5px; border-radius:5px; border:none; background:#22c55e; color:white; }
</style>

</head>

<body>

<h1>🚀 Money Automático</h1>

<div id="loginBox">
<div class="box">
<h3>Login</h3>
<input id="email" placeholder="Email"><br>
<input id="senha" type="password" placeholder="Senha"><br>
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="painel" style="display:none;">
<h3 id="userId"></h3>

<div class="box">
<h3>📤 Disparo</h3>
<input id="numeros" placeholder="55819999,55818888"><br>
<input id="mensagem" placeholder="Mensagem"><br>
<button onclick="disparar()">Disparar</button>
</div>

<div class="box">
<h3>🤖 IA</h3>
<input id="textoIA"><br>
<button onclick="salvarIA()">Salvar</button>
<button onclick="carregarIA()">Carregar</button>
</div>

<button onclick="logout()">Sair</button>
</div>

<script>

async function login() {
  const res = await fetch("/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email.value,
      password: senha.value
    })
  });

  const data = await res.json();

  if (!data.token || !data.userId) {
    alert("Erro no login");
    return;
  }

  localStorage.setItem("token", data.token);
  localStorage.setItem("userId", data.userId);

  loginBox.style.display="none";
  painel.style.display="block";
  userId.innerText="Seu ID: "+data.userId;
}

window.onload = () => {
  const token = localStorage.getItem("token");
  const id = localStorage.getItem("userId");

  if (token && id && id !== "null") {
    loginBox.style.display="none";
    painel.style.display="block";
    userId.innerText="Seu ID: "+id;
  }
};

async function disparar() {
  const res = await fetch("/enviar", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body: JSON.stringify({
      numeros: numeros.value,
      mensagem: mensagem.value
    })
  });

  const data = await res.json();
  alert(data.sucesso ? "Enviado!" : "Erro");
}

async function salvarIA() {
  await fetch("/salvar-ia", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":localStorage.getItem("token")
    },
    body: JSON.stringify({ texto: textoIA.value })
  });

  alert("Salvo!");
}

async function carregarIA() {
  const res = await fetch("/carregar-ia", {
    headers:{ "Authorization":localStorage.getItem("token") }
  });

  const data = await res.json();
  textoIA.value = data.texto;
}

function logout() {
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
